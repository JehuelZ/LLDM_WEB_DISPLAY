<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Símbolo: LLDM Rodeo California (Recreación Vectorial) -->
  <g id="building" fill="currentColor">
    <!-- Base principal del edificio -->
    <path d="M160 250 L160 380 L352 380 L352 250 H330 V220 H310 L310 180 H202 L202 220 H182 V250 Z" />
    <!-- Parte superior (Frontón) -->
    <path d="M220 180 V140 H292 V180 Z" />
    <path d="M200 140 H312 V120 H200 Z" />
    <path d="M230 120 V100 H282 V120 Z" />
    
    <!-- Ventanas/Detalles (Resta) -->
    <rect x="180" y="270" width="30" height="40" fill="gray" opacity="0.1" /> <!-- Representando huecos -->
    <path d="M180 270 H210 V310 H180 Z M220 270 H250 V310 H220 Z M262 270 H292 V310 H262 Z M302 270 H332 V310 H302 Z" fill="black" />
    <path d="M180 325 H210 V365 H180 Z M302 325 H332 V365 H302 Z" fill="black" />
    <!-- Puerta central -->
    <path d="M235 320 H277 V380 H235 Z" fill="black" />
    <path d="M245 230 H267 V280 H245 Z" fill="black" />
  </g>

  <!-- Curva del camino -->
  <path d="M80 400 C150 430 350 430 432 350 C400 480 150 480 80 400Z" fill="currentColor" />

  <!-- Texto: LLDM RODEO -->
  <text x="256" y="450" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="52" fill="currentColor" style="letter-spacing: 2px;">LLDM RODEO</text>
  
  <!-- Línea y California -->
  <line x1="100" y1="470" x2="412" y2="470" stroke="currentColor" stroke-width="2" />
  <text x="256" y="500" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="28" fill="currentColor" style="letter-spacing: 8px;">CALIFORNIA</text>
</svg>
