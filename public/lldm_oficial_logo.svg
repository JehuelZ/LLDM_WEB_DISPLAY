<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Símbolo: La Luz del Mundo (Recreación Vectorial Ligera) -->
  
  <g id="logo-content" stroke="white" stroke-width="2" stroke-linecap="round">
    <!-- Antorcha / Flama Superior -->
    <path d="M256 80 C265 80, 275 100, 275 120 C275 140, 265 150, 256 150 C247 150, 237 140, 237 120 C237 100, 247 80, 256 80Z" fill="white" stroke="none"/>
    <path d="M256 70 C260 50, 245 40, 250 20 C240 35, 255 45, 250 65" stroke="white" stroke-width="3" fill="none"/>
    <path d="M245 75 C240 60, 230 55, 235 40 C225 55, 235 65, 235 80" stroke="white" stroke-width="2" fill="none"/>
    <path d="M267 75 C272 60, 282 55, 277 40 C287 55, 277 65, 277 80" stroke="white" stroke-width="2" fill="none"/>

    <!-- Copa de la antorcha -->
    <path d="M235 150 L277 150 L265 175 L247 175 Z" fill="white" stroke="none"/>
    
    <!-- Arco de Horizonte -->
    <path d="M50 260 Q256 180 462 260" stroke-width="8" fill="none" />
    
    <!-- Rayos superiores (Antorcha al arco) -->
    <g stroke-opacity="0.8">
      <line x1="256" y1="180" x2="256" y2="220" />
      <line x1="256" y1="180" x2="216" y2="225" />
      <line x1="256" y1="180" x2="296" y2="225" />
      <line x1="256" y1="180" x2="180" y2="235" />
      <line x1="256" y1="180" x2="332" y2="235" />
      <line x1="256" y1="180" x2="150" y2="245" />
      <line x1="256" y1="180" x2="362" y2="245" />
    </g>

    <!-- Rayos inferiores (Bajo el arco) -->
    <g stroke-width="1.5" stroke-opacity="0.6">
      <line x1="256" y1="230" x2="256" y2="310" />
      <line x1="240" y1="235" x2="220" y2="310" />
      <line x1="272" y1="235" x2="292" y2="310" />
      <line x1="220" y1="240" x2="180" y2="310" />
      <line x1="292" y1="240" x2="332" y2="310" />
      <line x1="200" y1="245" x2="140" y2="310" />
      <line x1="312" y1="245" x2="372" y2="310" />
      <line x1="180" y1="250" x2="100" y2="310" />
      <line x1="332" y1="250" x2="412" y2="310" />
    </g>
  </g>

  <!-- Texto: La Luz del Mundo -->
  <text x="256" y="380" text-anchor="middle" font-family="'Times New Roman', serif" font-weight="bold" font-size="44" fill="white">LA LUZ DEL</text>
  <text x="256" y="445" text-anchor="middle" font-family="'Times New Roman', serif" font-weight="bold" font-size="64" fill="white">MUNDO</text>
  
</svg>
