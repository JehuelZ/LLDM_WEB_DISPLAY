<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Símbolo: Número 3 Estilizado (Tipo Flama) -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g filter="url(#glow)">
    <path d="M180 150 C180 100, 250 80, 300 120 C340 150, 320 220, 270 240 C340 260, 350 350, 290 400 C230 440, 160 410, 160 350" 
      stroke="url(#goldGradient)" 
      stroke-width="60" 
      stroke-linecap="round" 
      fill="none" 
      opacity="0.9" />
    
    <!-- Detalles internos para dar efecto de profundidad/flama -->
    <path d="M200 160 C200 130, 250 110, 280 140 C310 170, 290 210, 260 220" 
      stroke="white" 
      stroke-width="10" 
      stroke-linecap="round" 
      fill="none" 
      opacity="0.3" />
    
    <path d="M260 260 C310 280, 320 340, 280 370 C240 400, 190 380, 190 350" 
      stroke="white" 
      stroke-width="10" 
      stroke-linecap="round" 
      fill="none" 
      opacity="0.3" />
  </g>
</svg>
